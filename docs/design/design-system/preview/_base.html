<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-page); }
  .card {
    width: 700px;
    padding: 24px;
    background: var(--bg-surface);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-1);
    color: var(--fg-primary);
    font-family: var(--font-sans);
  }
  .row { display: flex; gap: 12px; align-items: stretch; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .swatch { border-radius: var(--radius-md); border: 1px solid var(--border-default); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-tertiary); margin-top: 6px; }
  .name { font-family: var(--font-sans); font-size: 12px; font-weight: 500; color: var(--fg-secondary); }
</style>
</head><body></body></html>
