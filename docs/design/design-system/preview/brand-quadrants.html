<!doctype html>
<html><head><meta charset="utf-8"><title>Quadrant marks</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background: var(--paper-100); }
  .card { width:660px; padding:28px; background: var(--paper-50); border:1px solid var(--ink-150); border-radius: 12px; display:flex; gap:24px; align-items:center; justify-content:space-around; }
  .item { display:flex; flex-direction:column; align-items:center; gap:10px; }
  .lbl { font-family: var(--font-serif); font-size:14px; font-weight:500; color:#4A4339; }
  img { width:48px; height:48px; }
</style></head>
<body><div class="card">
  <div class="item"><img src="../assets/quadrant-growth.svg" alt=""><div class="lbl">Growth</div></div>
  <div class="item"><img src="../assets/quadrant-inflation.svg" alt=""><div class="lbl">Inflation</div></div>
  <div class="item"><img src="../assets/quadrant-policy.svg" alt=""><div class="lbl">Policy</div></div>
  <div class="item"><img src="../assets/quadrant-market.svg" alt=""><div class="lbl">Market</div></div>
</div></body></html>
