<!doctype html>
<html><head><meta charset="utf-8"><title>Colors — Accent</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background: var(--bg-page); }
  .card { width:660px; padding:24px; background: var(--bg-surface); border:1px solid var(--border-default); border-radius: var(--radius-lg); display:flex; gap:24px; align-items:center; }
  .stack { display:flex; gap:6px; }
  .sw { width:60px; height:80px; border-radius: var(--radius-md); border:1px solid var(--border-default); padding:6px; display:flex; flex-direction:column; justify-content:flex-end; }
  .n { font-family: var(--font-sans); font-size:10px; font-weight:600; }
  .h { font-family: var(--font-mono); font-size:9px; opacity:.8; }
  .label { font-family: var(--font-sans); font-size:12px; font-weight:600; color: var(--fg-tertiary); letter-spacing: 0.06em; text-transform: uppercase; min-width:90px; }
</style></head>
<body><div class="card">
  <div class="label">Accent ink</div>
  <div class="stack">
    <div class="sw" style="background:#EEF1F6;color:#141E33"><div class="n">50</div><div class="h">EEF1F6</div></div>
    <div class="sw" style="background:#DCE2EC;color:#141E33"><div class="n">100</div><div class="h">DCE2EC</div></div>
    <div class="sw" style="background:#4A5E82;color:#FBF8F3"><div class="n">500</div><div class="h">4A5E82</div></div>
    <div class="sw" style="background:#3B4E6F;color:#FBF8F3"><div class="n">600</div><div class="h">3B4E6F</div></div>
    <div class="sw" style="background:#2C3E64;color:#FBF8F3"><div class="n">700·</div><div class="h">2C3E64</div></div>
    <div class="sw" style="background:#1F2D4B;color:#FBF8F3"><div class="n">800</div><div class="h">1F2D4B</div></div>
    <div class="sw" style="background:#141E33;color:#FBF8F3"><div class="n">900</div><div class="h">141E33</div></div>
  </div>
</div></body></html>
