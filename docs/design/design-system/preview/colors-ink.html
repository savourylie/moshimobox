<!doctype html>
<html><head><meta charset="utf-8"><title>Colors — Ink</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background: var(--bg-page); }
  .card { width:660px; padding:20px; background: var(--bg-surface); border:1px solid var(--border-default); border-radius: var(--radius-lg); }
  .row { display:grid; grid-template-columns: repeat(5, 1fr); gap:8px; }
  .sw { aspect-ratio: 1/1; border-radius: var(--radius-md); border:1px solid var(--border-default); padding:8px; display:flex; flex-direction:column; justify-content:flex-end; }
  .n { font-family: var(--font-sans); font-size:11px; font-weight:600; }
  .h { font-family: var(--font-mono); font-size:9px; opacity:.85; margin-top:1px; }
</style></head>
<body><div class="card">
  <div class="row">
    <div class="sw" style="background:#1F1B16;color:#FBF8F3"><div class="n">ink-900</div><div class="h">#1F1B16</div></div>
    <div class="sw" style="background:#2E2820;color:#FBF8F3"><div class="n">ink-800</div><div class="h">#2E2820</div></div>
    <div class="sw" style="background:#4A4339;color:#FBF8F3"><div class="n">ink-700</div><div class="h">#4A4339</div></div>
    <div class="sw" style="background:#6B6357;color:#FBF8F3"><div class="n">ink-600</div><div class="h">#6B6357</div></div>
    <div class="sw" style="background:#8B8377;color:#FBF8F3"><div class="n">ink-500</div><div class="h">#8B8377</div></div>
    <div class="sw" style="background:#A8A092;color:#1F1B16"><div class="n">ink-400</div><div class="h">#A8A092</div></div>
    <div class="sw" style="background:#C4BCAE;color:#1F1B16"><div class="n">ink-300</div><div class="h">#C4BCAE</div></div>
    <div class="sw" style="background:#D8D1C3;color:#1F1B16"><div class="n">ink-200</div><div class="h">#D8D1C3</div></div>
    <div class="sw" style="background:#E2DBCD;color:#1F1B16"><div class="n">ink-150</div><div class="h">#E2DBCD</div></div>
    <div class="sw" style="background:#ECE6D9;color:#1F1B16"><div class="n">ink-100</div><div class="h">#ECE6D9</div></div>
  </div>
</div></body></html>
