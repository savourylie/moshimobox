<!doctype html>
<html><head><meta charset="utf-8"><title>Shadows</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:32px; background: var(--paper-100); }
  .wrap { width:660px; padding:32px; background: var(--bg-surface); border:1px solid var(--border-default); border-radius: var(--radius-lg); display:flex; gap:24px; align-items:center; justify-content:center; }
  .item { display:flex; flex-direction:column; gap:8px; align-items:center; }
  .b { width:120px; height:80px; background: var(--paper-50); border:1px solid var(--border-default); border-radius: var(--radius-md); }
  .s1 { box-shadow: 0 1px 2px rgba(40,30,20,0.04), 0 1px 1px rgba(40,30,20,0.03); }
  .s2 { box-shadow: 0 4px 12px rgba(40,30,20,0.06), 0 2px 4px rgba(40,30,20,0.04); }
  .s3 { box-shadow: 0 12px 32px rgba(40,30,20,0.10), 0 4px 8px rgba(40,30,20,0.05); }
  .n { font-family: var(--font-sans); font-size:11px; font-weight:600; color: var(--ink-900); }
  .h { font-family: var(--font-mono); font-size:10px; color: var(--ink-500); }
</style></head>
<body><div class="wrap">
  <div class="item"><div class="b s1"></div><div class="n">shadow-1</div><div class="h">resting</div></div>
  <div class="item"><div class="b s2"></div><div class="n">shadow-2</div><div class="h">hover</div></div>
  <div class="item"><div class="b s3"></div><div class="n">shadow-3</div><div class="h">popover</div></div>
</div></body></html>
