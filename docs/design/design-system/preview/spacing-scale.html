<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background: var(--bg-page); }
  .card { width:660px; padding:24px; background: var(--bg-surface); border:1px solid var(--border-default); border-radius: var(--radius-lg); display:flex; flex-direction:column; gap:8px; }
  .row { display:flex; align-items:center; gap:12px; font-family: var(--font-mono); font-size:11px; color: var(--ink-700); }
  .bar { background: #2C3E64; height: 12px; border-radius: 2px; }
  .lbl { width: 80px; flex-shrink:0; font-family: var(--font-sans); font-size:12px; font-weight:600; color: var(--ink-900); }
  .px { color: var(--ink-500); margin-left:auto; }
</style></head>
<body><div class="card">
  <div class="row"><div class="lbl">sp-1</div><div class="bar" style="width:4px"></div><div class="px">4 px</div></div>
  <div class="row"><div class="lbl">sp-2</div><div class="bar" style="width:8px"></div><div class="px">8 px</div></div>
  <div class="row"><div class="lbl">sp-3</div><div class="bar" style="width:12px"></div><div class="px">12 px</div></div>
  <div class="row"><div class="lbl">sp-4</div><div class="bar" style="width:16px"></div><div class="px">16 px</div></div>
  <div class="row"><div class="lbl">sp-5</div><div class="bar" style="width:20px"></div><div class="px">20 px</div></div>
  <div class="row"><div class="lbl">sp-6</div><div class="bar" style="width:24px"></div><div class="px">24 px</div></div>
  <div class="row"><div class="lbl">sp-8</div><div class="bar" style="width:32px"></div><div class="px">32 px</div></div>
  <div class="row"><div class="lbl">sp-10</div><div class="bar" style="width:40px"></div><div class="px">40 px</div></div>
  <div class="row"><div class="lbl">sp-14</div><div class="bar" style="width:56px"></div><div class="px">56 px</div></div>
  <div class="row"><div class="lbl">sp-18</div><div class="bar" style="width:72px"></div><div class="px">72 px</div></div>
</div></body></html>
