<!doctype html>
<html><head><meta charset="utf-8"><title>Type — Headings</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background: var(--bg-page); }
  .card { width:660px; padding:24px; background: var(--bg-surface); border:1px solid var(--border-default); border-radius: var(--radius-lg); display:flex; flex-direction:column; gap:18px; }
  .row { display:flex; gap:16px; align-items:baseline; }
  .meta { font-family: var(--font-mono); font-size:10px; color: var(--fg-tertiary); width:140px; flex-shrink:0; }
  .h1 { font-family:var(--font-serif); font-size:40px; line-height:1.2; font-weight:500; letter-spacing:-0.015em; color:var(--ink-900); }
  .h2 { font-family:var(--font-serif); font-size:28px; line-height:1.25; font-weight:500; letter-spacing:-0.01em; color:var(--ink-900); }
  .h3 { font-family:var(--font-serif); font-size:20px; line-height:1.3; font-weight:600; color:var(--ink-900); }
  .h4 { font-family:var(--font-sans); font-size:14px; font-weight:600; letter-spacing:0.04em; text-transform:uppercase; color:var(--fg-tertiary); }
</style></head>
<body><div class="card">
  <div class="row"><div class="meta">h1 · 40/48</div><div class="h1">Macro snapshot</div></div>
  <div class="row"><div class="meta">h2 · 28/35</div><div class="h2">Inflation</div></div>
  <div class="row"><div class="meta">h3 · 20/26</div><div class="h3">US headline CPI</div></div>
  <div class="row"><div class="meta">h4-ui · 14/18</div><div class="h4">Section label</div></div>
</div></body></html>
