<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Moshimo Box — Dashboard</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body, #root { margin: 0; padding: 0; min-height: 100vh; background: var(--paper-100); }
  .iconbtn {
    background: transparent; border: 1px solid transparent;
    color: var(--ink-700); width: 32px; height: 32px;
    border-radius: 8px; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background 160ms cubic-bezier(0.2,0,0,1);
  }
  .iconbtn:hover { background: var(--paper-100); color: var(--ink-900); }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--ink-200); border-radius: 999px; border: 2px solid var(--paper-100); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="chat.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
